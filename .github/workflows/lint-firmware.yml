name: Lint (Firmware)

on:
  push:
    branches: [main]
    paths:
      - 'firmware/**.c'
      - 'firmware/**.h'
      - '.github/workflows/lint-firmware.yml'
  pull_request:
    branches: [main]
    paths:
      - 'firmware/**.c'
      - 'firmware/**.h'
      - '.github/workflows/lint-firmware.yml'
  workflow_dispatch:

concurrency:
  group: lint-firmware-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cppcheck-firmware:
    name: cppcheck (Firmware / C11)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for C source files
        id: check
        run: |
          if ! find firmware -name '*.c' -o -name '*.h' 2>/dev/null | grep -q .; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "::notice::No C files in firmware/ — skipping cppcheck"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install cppcheck
        if: steps.check.outputs.skip != 'true'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq cppcheck

      - name: Run cppcheck on firmware (C11)
        if: steps.check.outputs.skip != 'true'
        run: |
          # DESIGN: ESP-IDF headers are not available on ubuntu-latest, so we suppress
          # all missing-include warnings. missingInclude covers both system (<>) and
          # user ("") headers. Static analysis still catches logic errors.
          cppcheck \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=missingInclude \
            --suppress=unmatchedSuppression \
            --inline-suppr \
            --std=c11 \
            firmware/

      - name: Lint summary
        if: steps.check.outputs.skip != 'true'
        run: echo "::notice::Firmware cppcheck passed"
